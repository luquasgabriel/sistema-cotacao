{% load static %}
<header class="shadow-sm" style="background-color: #D7F5E1;">
    <div class="flex items-center px-4 sm:px-6 py-2">
        <button onclick="document.getElementById('sidebar-wrapper').classList.toggle('hidden')"
                class="btn btn-ghost btn-sm md:hidden mr-2" style="color: #232323;">
            <svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 6h16M4 12h16M4 18h16" />
            </svg>
        </button>

        <div class="flex items-center justify-end flex-1">
            <div class="flex items-center gap-2">
                <button class="btn btn-sm btn-circle relative"
                        style="background-color: #E8F8ED; border: none; color: #232323;">
                    <svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
                        <path stroke-linecap="round" stroke-linejoin="round" d="M15 17h5l-1.405-1.405A2.032 2.032 0 0118 14.158V11a6.002 6.002 0 00-4-5.659V5a2 2 0 10-4 0v.341C7.67 6.165 6 8.388 6 11v3.159c0 .538-.214 1.055-.595 1.436L4 17h5m6 0v1a3 3 0 11-6 0v-1m6 0H9" />
                    </svg>
                    <span class="badge badge-error badge-xs badge-circle absolute -top-1 -right-1">3</span>
                </button>

                <div class="dropdown dropdown-end">
                    <div tabindex="0" role="button" class="flex items-center gap-2 cursor-pointer py-1">
                        <div class="avatar placeholder">
                            <div class="w-7 sm:w-8 rounded-full bg-[#E8F8ED] ring-2 ring-[#67C180]">
                                <span class="text-xs" style="color: #232323;">{{ user.get_full_name|default:user.username|first|upper }}</span>
                            </div>
                        </div>
                        <div>
                            <svg xmlns="http://www.w3.org/2000/svg" class="h-4 w-4" style="color: #232323;" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 9l-7 7-7-7" />
                            </svg>
                        </div>
                    </div>
                    <ul tabindex="0" class="dropdown-content menu bg-base-100 rounded-box z-[1] w-52 p-2 shadow-lg mt-2">
                        <li class="menu-title text-base-content/40"><span>Conta</span></li>
                        <li><a href="{% url 'dashboard:profile' %}">Meu Perfil</a></li>
                        <li><a href="{% url 'admin:index' %}">Administração</a></li>
                        <li class="menu-title text-base-content/40 mt-2"><span>Sessão</span></li>
                        <li>
                            <form method="post" action="{% url 'logout' %}">
                                {% csrf_token %}
                                <button type="submit" class="w-full text-left text-error">
                                    Sair
                                </button>
                            </form>
                        </li>
                    </ul>
                </div>
            </div>
        </div>
    </div>
</header>
